default_policy:
  use_local_methodology_notes_first: true
  web_search_required: false
  notes: >
    For SLR, SMS, tertiary-study, PRISMA, SEGRESS, theoretical framework, and
    theory-development tasks, use the local Markdown source notes in this
    directory before considering any web lookup. These notes were distilled
    from user-provided local PDFs.

source_priority:
  - segress
  - prisma_2020
  - kitchenham_guidelines
  - paul_framework_reviews_2023
  - kitchenham_process_review_2013
  - kitchenham_preliminary_2002
  - lim_2026_theory_development
  - luft_et_al_2022_frameworks
  - grant_osanloo_2014_dissertation
  - klopper_matrix_2007

sources:
  segress:
    type: reporting_guideline
    basis_files:
      - local_pdf: "SEGRESS.pdf"
      - local_pdf: "SEGRESS22supplement.pdf"
    local_notes:
      - "source_notes/segress_core.md"
      - "source_notes/segress_supplement.md"
    use_for:
      - reporting secondary studies in software engineering
      - adapting PRISMA-style reporting to software engineering reviews
      - mapping-study and qualitative-review reporting extensions
    notes:
      - "Treat SEGRESS as the software-engineering reporting layer."
      - "Use the supplement when item-level explanation or examples are needed."

  prisma_2020:
    type: reporting_guideline
    basis_files:
      - local_pdf: "Prisma 2020.pdf"
    local_notes:
      - "source_notes/prisma_2020_core.md"
    use_for:
      - transparent reporting
      - checklist logic
      - abstract checklist
      - flow-diagram expectations
    notes:
      - "Use PRISMA as a reporting standard, not as the sole review-design method."

  kitchenham_guidelines:
    type: review_method_guideline
    basis_files:
      - local_pdf: "Kitchenham 2019.pdf"
      - local_pdf: "Kitchenham-2007Systematicreviews5-8.pdf"
    local_notes:
      - "source_notes/kitchenham_guidelines_core.md"
    use_for:
      - planning, conducting, and reporting software-engineering SLRs
      - deciding between SLR, SMS, and tertiary review
      - protocol design
      - research-question formulation
    notes:
      - "The 'Kitchenham 2019' file is a local copy of the EBSE-2007-01 guideline content."

  kitchenham_process_review_2013:
    type: process_review
    basis_files:
      - local_pdf: "Kitchenham, Brereton - 2013 - A systematic review of systematic review process research in software engineering.pdf"
    local_notes:
      - "source_notes/kitchenham_process_review_2013.md"
    use_for:
      - refining search strategy guidance
      - understanding common SR process problems
      - tool-use cautions
      - quality-assessment caveats

  paul_framework_reviews_2023:
    type: theory_building_review_guideline
    basis_files:
      - local_pdf: "Paul, Khatri, Kaur Duggal - 2023 - Frameworks for developing impactful systematic literature reviews and theory building What, Why and H.pdf"
    local_notes:
      - "source_notes/paul_framework_reviews_2023.md"
    use_for:
      - framework-based systematic literature reviews
      - theory-building review design
      - choosing review-organising frameworks
      - structuring impactful conceptual synthesis
    notes:
      - "Use when the user wants a theory-building or framework-driven review, not only a protocol-compliance review."

  kitchenham_preliminary_2002:
    type: empirical_guideline
    basis_files:
      - local_pdf: "Kitchenham_2002_IEEETSE_721.pdf"
    local_notes:
      - "source_notes/kitchenham_preliminary_2002.md"
    use_for:
      - empirical-study quality expectations
      - methodological reporting expectations
      - critical appraisal orientation
    notes:
      - "Use as background guidance rather than as the primary SLR protocol standard."

  lim_2026_theory_development:
    type: theory_development_guideline
    basis_files:
      - local_pdf: "Lim - 2026 - Theory and theory development Guidelines for establishing theoretical gaps , foundations , contributions , and implication.pdf"
    local_notes:
      - "source_notes/lim_2026_theory_development.md"
    use_for:
      - identifying and classifying theoretical gaps (unexplored, underdeveloped, uncertain)
      - problematizing gaps (debates, disconnects, direness)
      - establishing theoretical foundations using five-question framework
      - framing theoretical contributions by novelty level
      - writing theoretical implications using 3Rs (recap, retrospect, reimagine)
      - evaluating theoretical interestingness (counterintuitivity, paradoxicality, noteworthiness)
    notes:
      - "Primary source for theory-gap identification and contribution-novelty framing."
      - "Use the 3Us taxonomy when classifying gap types in introduction or literature review sections."
      - "Use the five-level contribution typology when framing novelty claims."

  luft_et_al_2022_frameworks:
    type: conceptual_framework_guideline
    basis_files:
      - local_pdf: "luft-et-al-2022-literature-reviews-theoretical-frameworks-and-conceptual-frameworks-an-introduction-for-new-biology.pdf"
    local_notes:
      - "source_notes/luft_et_al_2022_literature_reviews_frameworks.md"
    use_for:
      - distinguishing literature reviews, theoretical frameworks, and conceptual frameworks
      - selecting a theoretical framework using three key considerations
      - constructing conceptual frameworks from literature and emergent ideas
      - aligning framework with research question, methods, and findings
    notes:
      - "Use when the user needs to select or articulate a theoretical or conceptual framework."
      - "Provides worked examples (Jensen & Lawson 2011; Sabel et al. 2017) for framework alignment."

  grant_osanloo_2014_dissertation:
    type: dissertation_framework_guideline
    basis_files:
      - local_pdf: "UNDERSTANDING, SELECTING, AND INTEGRATING A THEORETICAL FRAMEWORK IN DISSERTATION RESEARCH.pdf"
    local_notes:
      - "source_notes/grant_osanloo_theoretical_framework_2014.md"
    use_for:
      - selecting a theoretical framework for dissertation research
      - integrating framework with problem, purpose, significance, and research questions
      - building concept maps to align framework and literature review
      - distinguishing theoretical from conceptual frameworks using house-blueprint analogy
    notes:
      - "Use for dissertation and thesis contexts where the framework must thread through all sections."
      - "8-step selection process and 9-point integration checklist are directly applicable."

  klopper_matrix_2007:
    type: literature_review_method
    basis_files:
      - local_pdf: "Matrix of Literature Review.pdf"
    local_notes:
      - "source_notes/klopper_matrix_literature_review_2007.md"
    use_for:
      - structuring literature reviews using the concept matrix method
      - extracting key concepts from problem statements for matrix columns
      - systematic, comparative analysis across multiple references
      - avoiding patchwork or cherry-picked literature reviews
    notes:
      - "Use when the user needs a structured approach to organising literature review content."
      - "Concept columns in the matrix become section headings in the written review."
