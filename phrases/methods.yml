research_design:
  rhetorical_category: procedural_description
  communicative_purpose: describe the design of the study
  section_applicability:
    - methods
  strength_level: direct
  discipline_suitability:
    - general
  tone_intensity: formal
  caution_level: low
  phrase_variants:
    - "This study employed ..."
    - "A case-study design was adopted ..."
    - "A mixed-method approach was utilised ..."
    - "Data were collected using ..."
    - "The study was designed as ..."
    - "An exploratory design was selected in order to ..."
    - "A longitudinal approach was adopted to track ..."
    - "The research was conducted within a ..."
    - "A cross-sectional design was used to examine ..."
    - "This investigation draws on ..."
  example_transformations:
    input: "We used interviews and surveys."
    output: "A mixed-method approach was utilised, combining semi-structured interviews with a cross-sectional survey."

previously_used_methods:
  rhetorical_category: procedural_description
  communicative_purpose: situate the current method within established practice
  section_applicability:
    - methods
  strength_level: moderate
  discipline_suitability:
    - general
  tone_intensity: formal
  caution_level: low
  phrase_variants:
    - "Following the procedure described by ..."
    - "The methodology adopted here is consistent with that used in ..."
    - "A procedure similar to that reported by X was followed ..."
    - "The approach developed by X was adapted for ..."
    - "Drawing on the framework established by ..."
    - "The instrument used was originally developed by ..."
  example_transformations:
    input: "We used the same coding scheme as Smith (2019)."
    output: "The coding scheme developed by Smith (2019) was adopted with minor adaptations to suit the present corpus."

methodological_justification:
  rhetorical_category: procedural_justification
  communicative_purpose: explain why a particular method was chosen
  section_applicability:
    - methods
  strength_level: assertive
  discipline_suitability:
    - general
  tone_intensity: formal
  caution_level: low
  phrase_variants:
    - "This approach was selected because ..."
    - "The method is particularly appropriate for ..."
    - "A qualitative approach was considered most suitable given ..."
    - "This design was preferred over alternatives because ..."
    - "The use of X was justified on the grounds that ..."
    - "X was chosen in preference to Y because ..."
    - "This framework enables ..."
    - "The rationale for adopting X was ..."
  example_transformations:
    input: "We chose interviews because surveys would not capture nuance."
    output: "Semi-structured interviews were preferred over survey instruments on the grounds that they enable participants to elaborate responses and introduce dimensions not anticipated by the researcher."

participant_provenance:
